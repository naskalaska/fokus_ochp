<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Грамматический фокус: однородные члены</title>
  <style>
    :root {
      --gold: #ffd76f;
      --cream: #fff2c6;
      --ink: #3b220f;
      --purple-panel: rgba(42, 18, 58, 0.78);
      --border: rgba(255, 214, 112, 0.72);
      --shadow: rgba(0, 0, 0, 0.45);
      --h: 100svh;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: #fff;
      background: #17051f;
    }

    body {
      min-height: var(--h);
    }

    .game {
      position: relative;
      width: 100vw;
      height: var(--h);
      overflow: hidden;
      background-image: url("Fon1.png");
      background-size: cover;
      background-position: center;
      isolation: isolate;
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 225, 150, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(24, 4, 39, 0.08), rgba(24, 4, 39, 0.45));
      pointer-events: none;
    }

    .top-panel {
      position: absolute;
      z-index: 20;
      top: clamp(10px, 2.2vh, 24px);
      left: 50%;
      transform: translateX(-50%);
      width: min(1120px, 93vw);
      padding: clamp(12px, 2vw, 20px);
      border: 2px solid var(--border);
      border-radius: 24px;
      background: var(--purple-panel);
      box-shadow: 0 18px 42px var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: clamp(15px, 1.45vw, 21px);
      letter-spacing: 0.02em;
    }

    .formula {
      margin: 0 0 8px;
      text-align: center;
      color: var(--cream);
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.18;
    }

    .sentence {
      margin: 0;
      text-align: center;
      color: #fff;
      font-size: clamp(18px, 2.05vw, 30px);
      line-height: 1.28;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.24);
    }

    .stage {
      position: absolute;
      z-index: 10;
      left: 50%;
      bottom: clamp(12px, 3vh, 42px);
      transform: translateX(-50%);
      width: min(1120px, 95vw);
      height: min(55vh, 470px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      justify-items: center;
      gap: clamp(8px, 3vw, 42px);
    }

    .choice {
      position: relative;
      width: min(320px, 30vw);
      height: 100%;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      filter: drop-shadow(0 22px 18px rgba(0, 0, 0, 0.42));
      -webkit-tap-highlight-color: transparent;
    }

    .choice:disabled {
      cursor: default;
    }

    .hat {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(250px, 25vw);
      max-height: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      pointer-events: none;
      animation: hatFloat 3.4s ease-in-out infinite;
      z-index: 3;
    }

    .choice:nth-child(2) .hat {
      animation-delay: 0.35s;
    }

    .choice:nth-child(3) .hat {
      animation-delay: 0.7s;
    }

    @keyframes hatFloat {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-0.8deg); }
      50% { transform: translateX(-50%) translateY(-8px) rotate(0.8deg); }
    }

    .scroll-button {
      position: absolute;
      left: 50%;
      bottom: 51%;
      width: min(300px, 29vw);
      aspect-ratio: 1 / 1;
      border: 0;
      padding: 0;
      background: transparent;
      transform: translateX(-50%);
      cursor: pointer;
      z-index: 8;
      animation: scrollFloat 4s ease-in-out infinite;
      transition: transform 0.22s ease, filter 0.22s ease, opacity 0.22s ease;
      filter: drop-shadow(0 18px 16px rgba(0, 0, 0, 0.36));
      -webkit-tap-highlight-color: transparent;
    }

    .choice:nth-child(2) .scroll-button {
      animation-delay: 0.35s;
    }

    .choice:nth-child(3) .scroll-button {
      animation-delay: 0.7s;
    }

    .scroll-button:not(:disabled):hover {
      transform: translateX(-50%) translateY(-10px) scale(1.035);
      filter: drop-shadow(0 24px 18px rgba(0, 0, 0, 0.44));
    }

    .scroll-button:disabled {
      cursor: default;
    }

    @keyframes scrollFloat {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-1deg); }
      50% { transform: translateX(-50%) translateY(-12px) rotate(1deg); }
    }

    .scroll-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .answer-text {
      position: absolute;
      left: 17%;
      right: 17%;
      top: 38%;
      transform: translateY(-50%);
      text-align: center;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 900;
      font-size: clamp(20px, 2.4vw, 34px);
      line-height: 1.05;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
      pointer-events: none;
      overflow-wrap: anywhere;
    }

    .rabbit {
      position: absolute;
      left: 50%;
      bottom: 18%;
      width: min(132px, 13vw);
      transform: translateX(-50%) translateY(50px) scale(0.55);
      opacity: 0;
      z-index: 6;
      object-fit: contain;
      pointer-events: none;
    }

    .choice.correct .rabbit {
      animation: rabbitPop 0.78s cubic-bezier(.2, 1.5, .42, 1) forwards;
    }

    @keyframes rabbitPop {
      0% { opacity: 0; transform: translateX(-50%) translateY(48px) scale(0.4); }
      60% { opacity: 1; transform: translateX(-50%) translateY(-38px) scale(1.1); }
      100% { opacity: 1; transform: translateX(-50%) translateY(-28px) scale(1); }
    }

    .effect {
      position: absolute;
      left: 50%;
      bottom: 33%;
      width: min(270px, 26vw);
      opacity: 0;
      transform: translateX(-50%) scale(0.35);
      pointer-events: none;
      z-index: 12;
    }

    .choice.correct .sparkles,
    .choice.wrong .smoke {
      animation: effectPop 0.95s ease-out forwards;
    }

    @keyframes effectPop {
      0% { opacity: 0; transform: translateX(-50%) scale(0.25) rotate(-5deg); }
      24% { opacity: 1; transform: translateX(-50%) scale(1.08) rotate(2deg); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.38) rotate(0deg); }
    }

    .feedback {
      position: absolute;
      left: 50%;
      top: 43%;
      transform: translate(-50%, -50%) scale(0.96);
      z-index: 60;
      min-width: min(520px, 84vw);
      max-width: 90vw;
      padding: 16px 24px;
      border: 2px solid rgba(255, 225, 140, 0.9);
      border-radius: 20px;
      background: rgba(36, 10, 47, 0.9);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.44);
      text-align: center;
      font-size: clamp(19px, 2.2vw, 31px);
      color: #fff8d8;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .feedback.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .start-screen,
    .final-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at center, rgba(255, 210, 110, 0.14), transparent 34%),
        rgba(18, 4, 30, 0.64);
      backdrop-filter: blur(4px);
    }

    .final-screen {
      display: none;
      background-image:
        linear-gradient(180deg, rgba(21, 4, 28, 0.20), rgba(21, 4, 28, 0.52)),
        url("Fon2.png");
      background-size: cover;
      background-position: center;
      backdrop-filter: none;
    }

    .card {
      width: min(760px, 92vw);
      padding: clamp(22px, 4vw, 40px);
      border: 2px solid var(--border);
      border-radius: 30px;
      background: rgba(39, 11, 52, 0.88);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .card h1,
    .card h2 {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: clamp(31px, 5vw, 58px);
      line-height: 1;
    }

    .card p {
      margin: 0 auto 22px;
      max-width: 650px;
      color: var(--cream);
      font-size: clamp(17px, 2vw, 24px);
      line-height: 1.35;
    }

    .magic-button {
      border: 0;
      border-radius: 999px;
      padding: 15px 30px;
      color: #3a210c;
      background: linear-gradient(180deg, #fff2a4, #ffba3c);
      box-shadow: 0 9px 0 #8a4d09, 0 18px 26px rgba(0, 0, 0, 0.35);
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .magic-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 11px 0 #8a4d09, 0 22px 30px rgba(0, 0, 0, 0.38);
    }

    .magic-button:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 #8a4d09, 0 10px 18px rgba(0, 0, 0, 0.34);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 820px) {
      .top-panel {
        top: 8px;
        width: calc(100vw - 18px);
        padding: 9px 10px;
        border-radius: 18px;
      }

      .hud {
        margin-bottom: 5px;
        font-size: 13px;
      }

      .formula {
        margin-bottom: 5px;
        font-size: clamp(15px, 4vw, 20px);
      }

      .sentence {
        font-size: clamp(15px, 4.05vw, 20px);
        line-height: 1.2;
      }

      .stage {
        bottom: 2px;
        width: 99vw;
        height: min(54vh, 390px);
        gap: 0;
      }

      .choice {
        width: 33vw;
      }

      .hat {
        width: 31vw;
        max-height: 42%;
      }

      .scroll-button {
        width: 35vw;
        bottom: 44%;
      }

      .answer-text {
        font-size: clamp(15px, 5vw, 22px);
        left: 17%;
        right: 17%;
      }

      .rabbit {
        width: 16vw;
        bottom: 15%;
      }

      .effect {
        width: 31vw;
        bottom: 27%;
      }

      .feedback {
        top: 48%;
        padding: 12px 16px;
        font-size: clamp(18px, 5vw, 24px);
      }
    }

    @media (max-width: 470px) {
      .top-panel {
        padding: 8px 9px;
      }

      .hud {
        font-size: 12px;
      }

      .formula {
        font-size: 14px;
      }

      .sentence {
        font-size: 14px;
      }

      .stage {
        height: min(50vh, 335px);
      }

      .scroll-button {
        bottom: 42%;
      }

      .answer-text {
        font-size: clamp(13px, 4.7vw, 18px);
      }

      .rabbit {
        width: 15vw;
      }
    }

    @media (max-height: 620px) and (orientation: landscape) {
      .top-panel {
        top: 7px;
        padding: 7px 12px;
      }

      .formula {
        font-size: 16px;
        margin-bottom: 3px;
      }

      .sentence {
        font-size: 17px;
      }

      .stage {
        height: 55vh;
        bottom: 0;
      }

      .hat {
        max-height: 42%;
      }

      .scroll-button {
        width: min(250px, 24vw);
        bottom: 42%;
      }

      .rabbit {
        width: min(105px, 11vw);
      }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <section class="top-panel" aria-live="polite">
      <div class="hud">
        <div id="progress">Вопрос 1 / 20</div>
        <div id="score">Верно: 0</div>
      </div>
      <p class="formula">На месте каких цифр в предложении должны стоять запятые?</p>
      <p class="sentence" id="sentence"></p>
    </section>

    <div class="feedback" id="feedback"></div>

    <section class="stage" aria-label="Варианты ответа">
      <div class="choice" data-place="0">
        <button class="scroll-button" type="button" aria-label="Вариант 1">
          <img class="scroll-img" src="svitok-red.png" alt="" />
          <span class="answer-text"></span>
        </button>
        <img class="rabbit" src="rabbit.png" alt="" />
        <img class="effect smoke" src="dymok.png" alt="" />
        <img class="effect sparkles" src="feyerverk.png" alt="" />
        <img class="hat" src="hat_red.png" alt="" />
      </div>

      <div class="choice" data-place="1">
        <button class="scroll-button" type="button" aria-label="Вариант 2">
          <img class="scroll-img" src="svitok-blue.png" alt="" />
          <span class="answer-text"></span>
        </button>
        <img class="rabbit" src="rabbit.png" alt="" />
        <img class="effect smoke" src="dymok.png" alt="" />
        <img class="effect sparkles" src="feyerverk.png" alt="" />
        <img class="hat" src="hat_blue.png" alt="" />
      </div>

      <div class="choice" data-place="2">
        <button class="scroll-button" type="button" aria-label="Вариант 3">
          <img class="scroll-img" src="svitok-green.png" alt="" />
          <span class="answer-text"></span>
        </button>
        <img class="rabbit" src="rabbit.png" alt="" />
        <img class="effect smoke" src="dymok.png" alt="" />
        <img class="effect sparkles" src="feyerverk.png" alt="" />
        <img class="hat" src="hat_green.png" alt="" />
      </div>
    </section>

    <section class="start-screen" id="startScreen">
      <div class="card">
        <h1>Грамматический фокус</h1>
        <p>Свитки с вариантами ответа летают над шляпами. Нажмите на свиток с правильными цифрами — и фокус сработает.</p>
        <button class="magic-button" type="button" id="startButton">Начать фокус</button>
      </div>
    </section>

    <section class="final-screen" id="finalScreen">
      <div class="card">
        <h2>Браво!</h2>
        <p id="finalText">Все фокусы раскрыты.</p>
        <button class="magic-button" type="button" id="restartButton">Играть снова</button>
      </div>
    </section>
  </main>

  <script>
    const tasks = [
      {
        sentence: "Волшебник раскрыл книгу(1) зажёг синюю свечу(2) и произнёс древнее заклинание(3) но портал не открылся.",
        correct: "1, 3",
        options: ["1, 3", "1, 2, 3", "2, 3"]
      },
      {
        sentence: "В лавке продавались хрустальные шары(1) лунные амулеты(2) серебряные перья(3) и карты звёздного неба.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Юная фея двигалась быстро(1) бесшумно(2) и уверенно(3) но всё равно разбудила дракона.",
        correct: "1, 3",
        options: ["1, 3", "1, 2", "1, 2, 3"]
      },
      {
        sentence: "В башне мерцали не обычные свечи(1) а зачарованные звёзды(2) и голубые кристаллы(3) и тонкие нити света.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Старый маг не спорил(1) не сердился(2) не перебивал ученика(3) а только внимательно слушал.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Заклинание было коротким(1) но сильным(2) ясным(3) и удивительно красивым.",
        correct: "1, 2",
        options: ["1, 2", "1, 2, 3", "2, 3"]
      },
      {
        sentence: "Магистр поднял посох(1) коснулся печати(2) и шепнул пароль(3) а затем улыбнулся.",
        correct: "1, 3",
        options: ["1, 3", "1, 2", "1, 2, 3"]
      },
      {
        sentence: "Лес был тихим(1) тёмным(2) но не страшным(3) а удивительно приветливым.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Ученики собирали то лунные ягоды(1) то серебряные листья(2) то пыльцу папоротника(3) и складывали всё в мешочки.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 2", "2, 3"]
      },
      {
        sentence: "Дракон поднял крылья(1) вздохнул(2) да выпустил золотой дым(3) и снова задремал.",
        correct: "1, 3",
        options: ["1, 3", "1, 2", "1, 2, 3"]
      },
      {
        sentence: "Зелье пахло мятой(1) полынью(2) корицей(3) и дымом от волшебного костра.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Волшебная дверь то открывалась(1) то исчезала в стене(2) то превращалась в зеркало(3) но никого не впускала.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Маленький гном был не храбр(1) а просто упрям(2) настойчив(3) и очень любопытен.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 2", "1, 3"]
      },
      {
        sentence: "В сумке мага звенели колокольчики(1) ключи(2) бусины(3) и крошечные монеты.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Ночной сад светился мягко(1) ровно(2) и почти незаметно(3) но тропинка всё равно была видна.",
        correct: "1, 3",
        options: ["1, 3", "1, 2", "1, 2, 3"]
      },
      {
        sentence: "Заклинатель говорил медленно(1) но отчётливо(2) спокойно(3) и даже торжественно.",
        correct: "1, 2",
        options: ["1, 2", "1, 2, 3", "2, 3"]
      },
      {
        sentence: "На уроке ребята учились не только читать руны(1) но и составлять простые заклинания(2) и проверять силу амулетов(3) и объяснять ошибки.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Мантия была лёгкой(1) тёплой(2) почти невесомой(3) и очень удобной для полётов.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      },
      {
        sentence: "Из шкатулки посыпались то искры(1) то золотая пыль(2) то крошечные звёзды(3) но хозяйка шкатулки не удивилась.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 2", "2, 3"]
      },
      {
        sentence: "Мастер взял посох(1) плащ(2) книгу(3) но забыл волшебный ключ.",
        correct: "1, 2, 3",
        options: ["1, 2, 3", "1, 3", "2, 3"]
      }
    ];

    const assets = [
      "Fon1.png", "Fon2.png", "hat_blue.png", "hat_green.png", "hat_red.png",
      "rabbit.png", "dymok.png", "feyerverk.png",
      "svitok-blue.png", "svitok-green.png", "svitok-red.png"
    ];

    assets.forEach((src) => {
      const image = new Image();
      image.src = src;
    });

    const sentenceEl = document.getElementById("sentence");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const feedbackEl = document.getElementById("feedback");
    const startScreen = document.getElementById("startScreen");
    const finalScreen = document.getElementById("finalScreen");
    const finalText = document.getElementById("finalText");
    const choiceBlocks = Array.from(document.querySelectorAll(".choice"));
    const scrollButtons = Array.from(document.querySelectorAll(".scroll-button"));

    let gameTasks = [];
    let currentIndex = 0;
    let score = 0;
    let locked = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(value) {
      return String(value).replace(/\s+/g, "");
    }

    function showFeedback(text, type) {
      feedbackEl.textContent = text;
      feedbackEl.style.borderColor = type === "good"
        ? "rgba(255, 230, 120, 0.95)"
        : "rgba(220, 190, 255, 0.95)";
      feedbackEl.classList.add("show");
    }

    function hideFeedback() {
      feedbackEl.classList.remove("show");
    }

    function clearEffects() {
      choiceBlocks.forEach((block) => {
        block.classList.remove("correct", "wrong");
      });
      scrollButtons.forEach((button) => {
        button.disabled = false;
        button.style.opacity = "1";
      });
    }

    function renderTask() {
      const task = gameTasks[currentIndex];
      locked = false;
      hideFeedback();
      clearEffects();

      sentenceEl.textContent = task.sentence;
      progressEl.textContent = `Вопрос ${currentIndex + 1} / ${gameTasks.length}`;
      scoreEl.textContent = `Верно: ${score}`;

      const options = shuffle(task.options);
      scrollButtons.forEach((button, index) => {
        button.dataset.answer = options[index];
        button.querySelector(".answer-text").textContent = options[index];
      });
    }

    function handleAnswer(button) {
      if (locked) return;

      locked = true;
      const block = button.closest(".choice");
      const task = gameTasks[currentIndex];
      const selected = button.dataset.answer;
      const isCorrect = normalize(selected) === normalize(task.correct);

      scrollButtons.forEach((otherButton) => {
        otherButton.disabled = true;
        if (otherButton !== button) {
          otherButton.style.opacity = "0.55";
        }
      });

      if (isCorrect) {
        block.classList.add("correct");
        showFeedback("Верно! Кролик нашёл правильные запятые ✨", "good");
        score += 1;
        scoreEl.textContent = `Верно: ${score}`;

        setTimeout(() => {
          currentIndex += 1;
          if (currentIndex >= gameTasks.length) {
            finishGame();
          } else {
            renderTask();
          }
        }, 1350);
      } else {
        block.classList.add("wrong");
        showFeedback("Пшик! Этот свиток не подходит", "bad");

        setTimeout(() => {
          hideFeedback();
          clearEffects();
          locked = false;
        }, 1200);
      }
    }

    function startGame() {
      gameTasks = shuffle(tasks);
      currentIndex = 0;
      score = 0;
      startScreen.classList.add("hidden");
      finalScreen.style.display = "none";
      renderTask();
    }

    function finishGame() {
      hideFeedback();
      clearEffects();
      scrollButtons.forEach((button) => {
        button.disabled = true;
      });

      const percent = Math.round((score / gameTasks.length) * 100);
      finalText.textContent = `Вы раскрыли ${score} из ${gameTasks.length} фокусов. Результат: ${percent}%.`;
      finalScreen.style.display = "grid";
    }

    scrollButtons.forEach((button) => {
      button.addEventListener("click", () => handleAnswer(button));
    });

    document.getElementById("startButton").addEventListener("click", startGame);
    document.getElementById("restartButton").addEventListener("click", startGame);
  </script>
</body>
</html>
